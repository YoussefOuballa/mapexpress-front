<!-- blocks/widgets/hero-slider.html -->
<div class="splide splide-hero w-full h-full min-h-[400px] lg:min-h-[440px] relative group shadow-sm overflow-hidden lg:-mx-3" 
     aria-label="Hero News Slider"
     x-data
     x-init="new Splide($el, { 
        type: 'fade', 
        rewind: true, 
        autoplay: true,
        interval: 5000,
        arrows: true, 
        pagination: true,
        classes: {
            pagination: 'splide__pagination flex items-center gap-2 m-0 p-0 !static !transform-none',
            page      : 'splide__pagination__page  rounded-full bg-[#caced1] hover:opacity-80 transition-opacity focus:outline-none !static !transform-none opacity-100',
        }
     }).mount()">

    <!-- Slides Track -->
    <div class="splide__track w-full h-full">
        <ul class="splide__list w-full h-full">
            
            <!-- Slide 1 -->
            <li class="splide__slide flex flex-col md:flex-row w-full h-full bg-[#f2f4f6]">
                <div class="w-full md:w-[65%] md:h-full shrink-0 relative content-center">
                    <img src="assets/images/hero/hero-slider-1.jpg" alt="Autre actualité" class="w-full h-auto object-contain" onerror="this.style.display='none'">
                </div>
                <div class="w-full md:w-[35%] flex flex-col p-4 lg:p-8 relative">
                    <div class="mt-2 lg:mt-6">
                        <span class="text-[#575E6B] font-inter text-[0.85rem] font-medium mb-3 block">
                            Mardi 14 avril 2026
                        </span>
                        <h2 class="text-[1.4rem] lg:text-[1.65rem] font-serif font-semibold text-[#191919] tracking-tight leading-[1.3]">
                            Communiqué du Cabinet Royal
                        </h2>
                    </div>
                </div>
            </li>

            <!-- Slide 2 (Added so scrolling actually works!) -->
            <li class="splide__slide flex flex-col md:flex-row w-full h-full bg-[#f2f4f6]">
                <div class="w-full md:w-[65%] md:h-full shrink-0 relative content-center">
                    <img src="assets/images/hero/hero-slider-2.jpg" alt="Autre actualité" class="w-full h-auto object-contain" onerror="this.style.display='none'">
                </div>
                <div class="w-full md:w-[35%] flex flex-col p-4 lg:p-8 relative">
                    <div class="mt-2 lg:mt-6">
                        <span class="text-[#575E6B] font-inter text-[0.85rem] font-medium mb-3 block">
                            Samedi 25 Avril 2026
                        </span>
                        <h2 class="text-[1.4rem] lg:text-[1.65rem] font-serif font-semibold text-[#191919] tracking-tight leading-[1.3]">
                            Tour Mohammed VI : vitrine du renouveau architectural du Maroc, selon un média brésilien
                        </h2>
                    </div>
                </div>
            </li>

            <!-- Slide 3 -->
            <li class="splide__slide flex flex-col md:flex-row w-full h-full bg-[#f2f4f6]">
                <div class="w-full md:w-[65%] md:h-full shrink-0 relative content-center">
                    <img src="assets/images/hero/hero-slider-3.jpg" alt="Cabinet Royal" class="w-full h-auto object-contain" onerror="this.style.display='none'">
                </div>
                <div class="w-full md:w-[35%] flex flex-col p-4 lg:p-8 relative">
                    <div class="mt-2 lg:mt-6">
                        <span class="text-[#575E6B] font-inter text-[0.85rem] font-medium mb-3 block">
                            Dimanche 25 Avril 2026
                        </span>
                        <h2 class="text-[1.4rem] lg:text-[1.65rem] font-serif font-semibold text-[#191919] tracking-tight leading-[1.3]">
                            SM le Roi félicite la présidente tanzanienne à l'occasion de la fête nationale de son pays
                        </h2>
                    </div>
                </div>
            </li>

        </ul>
    </div>
    
    <!-- Functional Controls connected to Splide -->
    <div class="absolute bottom-5 right-[40%] md:bottom-10 md:right-10 flex items-center gap-7 z-10">
        
        <!-- Splide will automatically generate the dots inside this UL -->
        <ul class="splide__pagination flex items-center gap-2 m-0 p-0 !static !transform-none"></ul>
        
        <!-- Slider Navigation Arrows -->
        <div class="hidden md:flex splide__arrows flex items-center gap-3">
            <button class="splide__arrow splide__arrow--prev w-9 h-9 bg-white shadow-[0_2px_10px_rgba(0,0,0,0.06)] flex items-center justify-center rounded-full hover:bg-gray-50 transition-colors focus:outline-none !static !transform-none opacity-100 disabled:opacity-50">
                <i class="fa-solid fa-chevron-left text-gray-800 text-[0.8rem]"></i>
            </button>
            <button class="splide__arrow splide__arrow--next w-9 h-9 bg-white shadow-[0_2px_10px_rgba(0,0,0,0.06)] flex items-center justify-center rounded-full hover:bg-gray-50 transition-colors focus:outline-none !static !transform-none opacity-100 disabled:opacity-50">
                <i class="fa-solid fa-chevron-right text-gray-800 text-[0.8rem]"></i>
            </button>
        </div>
        
    </div>

</div>
