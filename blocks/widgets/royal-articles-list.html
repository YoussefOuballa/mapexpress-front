<!-- blocks/widgets/royal-articles-list.html -->
<!--
    Self-contained Royal article list block.
    Renders: list-title banner + filter bar + article list + pagination.

    Used on:
      - royal-activities.html (below the hero)
      - royal-article.html (below the article body)

    Owns its own x-data so it can be reused independently.
-->

    defaultArticleUrl: 'royal-article.html',
    listTitleClass: 'bg-[#9F8E75] text-white',
    page: 1,

    filters: [

        { value: 'royal-messages', label: 'Discours et Messages Royaux' }

    },
    get articles() { return this.articlesByFilter[this.activeFilter] || []; },
    get listTitle() { return this.titlesByFilter[this.activeFilter] || ''; },
    init() {
        const params = new URLSearchParams(window.location.search);
        if (params.get('p')) this.page = parseInt(params.get('p'));
    }
 }">

    <!-- LIST TITLE BANNER — colored via listTitleClass -->
    <template x-if="listTitle">
        <h2 :class="listTitleClass"
            class="font-sans font-bold text-xl lg:text-2xl leading-8 tracking-normal p-2.5 flex items-center gap-2.5 mb-3 lg:mb-4" x-text="listTitle"></h2>
    </template>

    <!-- ROYAL-SPECIFIC: Categories filter bar -->
    <div class="flex flex-wrap gap-[5px] mb-4 lg:mb-6">
        <template x-for="filter in filters" :key="filter.value">
            <button @click="activeFilter = filter.value"
                    :class="activeFilter === filter.value
                        ? 'bg-[#9F8E75] text-white border-[#AEAEAE]'
                        : 'bg-[#F4F4F4] text-[#0B1D32] border-transparent hover:bg-gray-200'"
                    class="flex-1 min-h-[32px] md:flex-none md:w-[217px] md:h-[32px] md:min-h-0 md:whitespace-nowrap px-[15px] py-[6px] border font-['Roboto_Flex'] text-[14px] font-semibold leading-[1.4] tracking-normal text-center transition-colors flex items-center justify-center">
                <span x-text="filter.label"></span>
            </button>
        </template>
    </div>

    <!-- Article list + pagination -->
    <div data-include="blocks/widgets/activities-articles-shell.html"></div>

</div>
