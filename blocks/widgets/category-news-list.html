<!-- blocks/widgets/category-news-list.html -->
<div class="flex flex-col w-full"
     x-data="{
        params: new URLSearchParams(window.location.search),
        category: 'Politique',
        page: 1,
        totalPages: 9,
        init() {
            if (this.params.get('c')) {
                this.category = this.params.get('c');
            }
            if (this.params.get('p')) {
                this.page = parseInt(this.params.get('p'));
            }
        }
     }">

    <!-- Hero (tag + date + title + excerpt + image) -->
    <div data-include="blocks/widgets/category-hero.html"></div>

    <!-- All news heading with extending line -->
    <div class="border-b-[1.5px] border-black pb-2 mb-2 lg:mb-4">
        <h2 class="text-[#191919] font-serif font-bold text-[26px] leading-[32px] tracking-[0.79px] align-middle uppercase"
            x-text="`Toutes les actualités ${category.toUpperCase()}`"></h2>
    </div>

    <!-- 9 articles list -->
    <div data-include="blocks/widgets/news-by-category.html"></div>

    <!-- Pagination -->
    <div data-include="blocks/global/pagination.html"></div>

</div>
