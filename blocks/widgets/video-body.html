<!-- blocks/widgets/video-body.html -->
<article class="flex flex-col w-full"
         x-data="{
            videoId: '',
            videoTitle: '',
            isRtl: false,
            init() {
                const params = new URLSearchParams(window.location.search);
                this.videoId = params.get('v') || 'xd0BY0hwaU0';
                this.videoTitle = params.get('t') || 'MAP TV';
                // RTL detection: any Arabic char in title
                this.isRtl = /[؀-ۿ]/.test(this.videoTitle);
                document.title = this.videoTitle + ' | Map Express';
            }
         }">

    <!-- BREADCRUMB -->
    <nav class="flex items-start text-[#191919] font-medium text-[#6C6C6C] text-[0.8rem] font-sans mb-3 lg:mb-6">
        <a href="/" class="hover:text-primary transition-colors">Accueil</a>
        <span class="mx-2">&gt;</span>
        <span class="text-[#0B1D32]">MAP TV</span>
    </nav>

    <!-- TITLE -->
    <h1 class="text-[#0B1D32] font-semibold text-2xl leading-[1.2] font-serif mb-3 lg:mb-5"
        :dir="isRtl ? 'rtl' : 'ltr'"
        x-text="videoTitle"></h1>

    <!-- VIDEO EMBED (full width, 16:9) -->
    <div class="w-full aspect-video bg-black overflow-hidden">
        <iframe :src="'https://www.youtube.com/embed/' + videoId"
                title="YouTube video"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen
                class="w-full h-full"></iframe>
    </div>

    <!-- DATE -->
    <time class="block text-[#868C98] font-medium text-sm font-sans mt-3 lg:mt-5">
        Vendredi, 24 avril, 2026
    </time>

</article>
