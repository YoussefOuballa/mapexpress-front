<!-- blocks/global/media-carousel.html -->
<!-- x-data initializes the Splide.js carousel -->
<div class="w-full px-4 sm:px-6 lg:px-8 pb-3 lg:py-3 relative"
     x-data="{ 
        init() {
            // Wait for Splide to load from CDN, then mount the carousel
            const checkSplide = setInterval(() => {
                if (window.Splide) {
                    clearInterval(checkSplide);
                    new Splide(this.$refs.splide, {
                        type: 'loop',
                        perPage: 5,
                        perMove: 2,
                        gap: '1.2rem',
                        pagination: false, // We hide dots, keep arrows
                        autoplay: true,
                        interval: 3000,
                        pauseOnHover: true,
                        // Handle RTL automatically
                        direction: document.documentElement.dir === 'rtl' ? 'rtl' : 'ltr',
                        breakpoints: {
                            1024: { perPage: 4, gap: '0.9rem' },
                            768: { perPage: 3, gap: '0.7rem' },
                            480: { perPage: 2, gap: '0.5rem' },
                        }
                    }).mount();
                }
            }, 100);
        }
     }">

    <!-- Custom Header Style -->
    <div class="border-b border-b-[1.6px] border-[#111110] pb-1 mb-5 lg:mb-4">
        <h2 class="text-[#191919] font-bold text-[22px] font-serif leading-[26px] tracking-normal align-middle ps-1">
            MAP SITES
        </h2>
    </div>
    
    <!-- Splide Main Wrapper -->
    <section x-ref="splide" class="splide" aria-label="MAP Network Media">
        
        <!-- ==============================================
             CUSTOM ARROWS (Matching your Mockup)
             ============================================== -->
        <div class="splide__arrows">
            <!-- Left Arrow -->
            <button class="splide__arrow splide__arrow--prev w-[50px] h-[50px] bg-white rounded-full shadow-sm transition-colors absolute top-1/2 -translate-y-1/2 left-0 xl:-left-16 z-10 flex items-center justify-center focus:outline-none">
                <i class="fa-solid fa-chevron-left text-[1rem] text-primary"></i>
            </button>
            
            <!-- Right Arrow -->
            <button class="splide__arrow splide__arrow--next w-[50px] h-[50px] bg-white rounded-full shadow-sm transition-colors absolute top-1/2 -translate-y-1/2 right-0 xl:-right-16 z-10 flex items-center justify-center focus:outline-none">
                <i class="fa-solid fa-chevron-right text-[1rem] text-primary"></i>
            </button>
        </div>

        <!-- ==============================================
