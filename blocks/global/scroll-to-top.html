<!-- blocks/global/scroll-to-top.html -->
<button 
    x-data="{ show: false }"
    @scroll.window="show = window.pageYOffset > 400"
    x-show="show"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-y-6"
    x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-300"
    x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-6"
    @click="window.scrollTo({ top: 0, behavior: 'smooth' })"
    class="fixed bottom-6 end-6 z-[60] w-[40px] h-[40px] bg-[#005bab] hover:bg-[#004280] text-white rounded-full shadow-lg flex items-center justify-center focus:outline-none transition-colors"
    aria-label="Scroll to top"
    style="display: none;">
    
    <i class="fa-solid fa-chevron-up text-md"></i>

</button>
