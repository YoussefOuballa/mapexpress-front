<!-- blocks/global/billboard-ad.html -->
<div class="flex flex-col w-full items-center">
    
    <!-- Rotating Ad Container -->
    <!-- Added max-w-[970px] to strictly limit the width, and mx-auto to center it -->
    <div x-data="{ active: 0, total: 3 }" 
         x-init="setInterval(() => active = (active + 1) % total, 3000)" 
         class="relative w-full max-w-[970px] aspect-[970/250] bg-gray-50 flex items-center justify-center overflow-hidden mx-auto">
        
        <!-- ==============================================
             AD 1 
             ============================================== -->
        <a href="https://femm.ma/"
           target="_blank" rel="noopener noreferrer"
           class="absolute inset-0 transition-opacity duration-1000 ease-in-out"
           :class="active === 0 ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'">
            <!-- Added w-full h-full so it matches the parent constraints exactly -->
            <img typeof="foaf:Image" src="assets/images/central_banners/leaderboard-970x250-1.jpg" alt="Advertisement" class="w-full h-full object-contain" width="970" height="250">
        </a>

        <!-- ==============================================
             AD 2 
             ============================================== -->
        <!-- Fixed the missing closing quote on href -->
        <a href="https://www.ntla9awfbladna.ma/tabi3at-bladna"
           target="_blank" rel="noopener noreferrer"
           class="absolute inset-0 transition-opacity duration-1000 ease-in-out"
           :class="active === 1 ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'">
            <img typeof="foaf:Image" src="assets/images/central_banners/leaderboard-970x250-2.jpg" alt="Advertisement" class="w-full h-full object-contain" width="970" height="250">
        </a>

        <!-- ==============================================
             AD 3
             ============================================== -->
        <!-- Fixed the missing closing quote on href -->
        <a href="https://hautmorocco.com/"
           target="_blank" rel="noopener noreferrer"
           class="absolute inset-0 transition-opacity duration-1000 ease-in-out"
           :class="active === 2 ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'">
            <img typeof="foaf:Image" src="assets/images/central_banners/leaderboard-970x250-3.webp" alt="Advertisement" class="w-full h-full object-contain" width="970" height="250">
        </a>

    </div>
</div>
