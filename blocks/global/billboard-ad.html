<!-- blocks/global/billboard-ad.html -->
<div class="flex flex-col w-full items-center">
    
    <!-- Rotating Ad Container -->
    <!-- We use 'grid' here so the items can stack in the exact same cell -->
    <div x-data="{ active: 0, total: 2 }" 
         x-init="setInterval(() => active = (active + 1) % total, 3000)" 
         class="w-full max-w-[970px] mx-auto grid">

        <!-- ==============================================
             AD 1 
             ============================================== -->
        <!-- col-start-1 row-start-1 forces it to share the same space as Ad 2 -->
        <a href="https://femm.ma/"
           target="_blank" rel="noopener noreferrer"
           class="col-start-1 row-start-1 flex items-center justify-center transition-opacity duration-1000 ease-in-out"
           :class="active === 0 ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'">
            <img typeof="foaf:Image" src="assets/images/central_banners/leaderboard-728x90-1.jpg" alt="Advertisement" class="w-full h-auto max-h-[525px] object-contain">
        </a>

        <!-- ==============================================
             AD 2 
             ============================================== -->
        <!-- col-start-1 row-start-1 forces it to share the same space as Ad 1 -->
        <a href="https://www.ntla9awfbladna.ma/tabi3at-bladna"
           target="_blank" rel="noopener noreferrer"
           class="col-start-1 row-start-1 flex items-center justify-center transition-opacity duration-1000 ease-in-out"
           :class="active === 1 ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none'">
            <img typeof="foaf:Image" src="assets/images/central_banners/leaderboard-728x90-2.webp" alt="Advertisement" class="w-full h-auto max-h-[525px] object-contain">
        </a>

    </div>
</div>
