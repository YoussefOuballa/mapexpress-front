<div class="max-w-7xl mx-auto px-0 mb-8">
    <!-- 12-column grid -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 lg:gap-x-0">

        <!-- MAIN CONTENT (Center) -->
        <section class="lg:col-span-9 flex flex-col gap-5 lg:gap-[80px] lg:pr-6">

            <!-- Politique category block -->
            <div data-include="blocks/widgets/center-politique.html"></div>

            <!-- Activités parlementaires category block -->
            <div data-include="blocks/widgets/center-activites-parlementaires.html"></div>

            <!-- Culture et Médias category block -->
            <div data-include="blocks/widgets/center-culture-medias.html"></div>

            <div class="w-full" data-include="blocks/widgets/press-releases.html"></div>

        </section>

        <!-- RIGHT SIDEBAR -->

            <!-- MAP TV vertical videos carousel -->
            <div data-include="blocks/widgets/right-map-tv.html"></div>

            <!-- Map Live -->
            <div data-include="blocks/widgets/right-map-live.html"></div>

        </aside>

    </div>
</div>

<div class="max-w-7xl mx-auto px-0 flex flex-col">

            <div data-include="blocks/widgets/center-sport.html"></div>
        </section>
        <section class="lg:col-span-4">
            <!-- Whatsapp channel Block -->
            <div class="flex flex-col w-full max-w-[416px] xl:mx-auto xl:w-[350px] xl:h-[330px]" data-include="blocks/widgets/right-wa-channel.html"></div>
        </section>
        <section class="lg:col-span-4">
            <div class="w-full aspect-video max-w-[416px] xl:mx-auto xl:w-[416px] xl:h-full xl:max-w-none xl:aspect-auto" data-include="blocks/widgets/right-yt-embed.html"></div>
        </section>
